<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Dummy Pariwisata</title>
    <style>
        /* Styling Dasar Dummy Website */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
        }

        .hero {
            background: linear-gradient(135deg, #ff86c4, #ff70ba);
            color: white;
            padding: 100px 20px;
            text-align: center;
        }

        /* ======== WIDGET LIVE CHAT STYLING ======== */
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            font-family: 'Inter', sans-serif;
        }

        /* Tombol Bulat untuk Membuka Chat */
        .chat-toggle {
            width: 60px;
            height: 60px;
            background-color: #ff86c4;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            border: none;
            font-size: 24px;
            transition: 0.3s;
        }

        .chat-toggle:hover {
            transform: scale(1.05);
        }

        /* Jendela Chat */
        .chat-window {
            display: none;
            /* Disembunyikan secara default */
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 350px;
            height: 500px;
            /* Efek Glassmorphism */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            flex-direction: column;
        }

        .chat-header {
            background: #eb25de;
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Balon Chat */
        .message {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.bot {
            background-color: #e5e7eb;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .message.user {
            background-color: #eb25de;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .chat-footer {
            padding: 15px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
            background: white;
        }

        .chat-footer input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #d1d5db;
            border-radius: 20px;
            outline: none;
            transition: 0.3s;
        }

        .chat-footer input:focus {
            border-color: #eb25de;
        }

        .chat-footer button {
            background-color: #eb25de;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
    <!-- Tambahkan library Marked.js untuk render Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <div class="hero">
        <h1>Selamat Datang di Ubud Activity Bali</h1>
        <p>contoh doang ini mahhhh, BISMILLAH SKRIPSI CEPET KELAR</p>
    </div>

    <div class="chat-widget">

        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                Live Chat Ubud Activity Bali
                <span style="font-size:12px; cursor:pointer;" onclick="toggleChat()">Tutup</span>
            </div>

            <div class="chat-body" id="chatBody">
                <div class="message bot">Halo! Saya asisten virtual Ubud Activity Bali. Ada yang bisa saya bantu terkait
                    liburan Anda?</div>
            </div>

            <div class="chat-footer">
                <input type="text" id="userInput" placeholder="Ketik pesan Anda..." onkeypress="handleEnter(event)">
                <button onclick="sendMessage()">Kirim</button>
            </div>
        </div>

        <button class="chat-toggle" onclick="toggleChat()">💬</button>

    </div>

    <script>
        // Riwayat percakapan — reset saat halaman di-refresh
        let conversationHistory = [];

        // Fungsi buka/tutup jendela chat
        function toggleChat() {
            const chatWindow = document.getElementById('chatWindow');
            chatWindow.style.display = chatWindow.style.display === 'flex' ? 'none' : 'flex';
        }

        // Tangkap tombol Enter
        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // Fungsi Mengirim Pesan ke Server Node.js (RAG)
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            const chatBody = document.getElementById('chatBody');

            // 1. Menampilkan pesan User
            chatBody.innerHTML += `<div class="message user">${text}</div>`;
            input.value = '';
            chatBody.scrollTop = chatBody.scrollHeight;

            // 2. Efek loading
            const loadingId = 'loading-' + Date.now();
            chatBody.innerHTML += `<div class="message bot" id="${loadingId}">...mengetik...</div>`;
            chatBody.scrollTop = chatBody.scrollHeight;

            try {
                // 3. Kirim pesan + history ke server
                const response = await fetch('http://localhost:3001/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history: conversationHistory })
                });

                const data = await response.json();

                // 4. Hapus loading dan tampilkan balasan
                document.getElementById(loadingId).remove();

                if (data.error) {
                    chatBody.innerHTML += `<div class="message bot" style="color:red;">Error: ${data.error}</div>`;
                } else {
                    // Simpan exchange ke history setelah berhasil
                    conversationHistory.push({ role: 'user', content: text });
                    conversationHistory.push({ role: 'assistant', content: data.answer });

                    const parsedMarkdown = marked.parse(data.answer);
                    chatBody.innerHTML += `<div class="message bot">${parsedMarkdown}</div>`;

                    // Jika bot tidak bisa menjawab, munculkan tombol WhatsApp
                    if (data.answer.includes("Mohon maaf")) {
                        chatBody.innerHTML += `
              <div class="message bot" style="background-color: #dbeafe; border-left: 4px solid #2563eb;">
                <span style="font-size:12px; color:#4b5563;"> Operasi Otomatis Terhenti.</span><br>
                Butuh jawaban spesifik? Silahkan hubungi Sales/CS kami.<br>
                <a href="https://wa.me/6285176702544" target="_blank" style="display:inline-block; margin-top:8px; padding:6px 12px; background-color:#25d366; color:white; text-decoration:none; border-radius:15px; font-weight:bold; font-size:12px;">📞 Sambungkan ke WhatsApp CS</a>
              </div>
            `;
                    }
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                chatBody.innerHTML += `<div class="message bot" style="color:red;">Koneksi ke backend terputus. Pastikan Terminal "npm start" menyala.</div>`;
            }
            chatBody.scrollTop = chatBody.scrollHeight;
        }
    </script>

</body>

</html>
